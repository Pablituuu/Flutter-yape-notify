name: yape_notificaciones
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_tts: ^4.2.5
  notification_listener_service: ^0.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/yape-logo-fondo-transparente.png
    - assets/images/app_icon.png

flutter_launcher_icons:
  android: "ic_launcher"
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
